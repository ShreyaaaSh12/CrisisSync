services:
  db:
    image: ankane/pgvector:latest # Special image with Vector + PostGIS
    container_name: shcrn-db
    restart: always
    environment:
      POSTGRES_DB: shcrn_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: